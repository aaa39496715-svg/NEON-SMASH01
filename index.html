  <meta name="keywords" content="테니스게임, 사이버펑크, 모바일게임, 무료게임, AI게임, 네온스매쉬">

  <!-- Open Graph / Facebook -->

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --sat: env(safe-area-inset-top);
      --sar: env(safe-area-inset-right);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
    }

    body {
      font-family: 'Pretendard', sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #010409; 
      touch-action: none;
      height: 100vh;
      height: -webkit-fill-available;
      /* Prevent elastic scrolling on iOS */
      position: fixed;
      width: 100%;
    }

    #root {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    .font-orbitron { font-family: 'Orbitron', sans-serif; }
    
    .cyber-grid {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background-image: 
        linear-gradient(rgba(16, 185, 129, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16, 185, 129, 0.1) 1px, transparent 1px);
      background-size: 50px 50px;
      transform: perspective(500px) rotateX(60deg);
      animation: grid-move 20s linear infinite;
      pointer-events: none;
    }

    @keyframes grid-move {
      from { background-position: 0 0; }
      to { background-position: 0 1000px; }
    }

    .scanlines {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      background-size: 100% 4px, 3px 100%;
      pointer-events: none;
      z-index: 50;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
    }

    .game-container {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 450px;
      max-height: 800px;
      aspect-ratio: 350 / 600;
      margin: auto;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(16, 185, 129, 0.2);
      border-radius: 10px;
    }

    /* Mobile specific adjustments */
    @media (max-width: 768px) {
      .safe-pt { padding-top: var(--sat); }
      .safe-pb { padding-bottom: var(--sab); }
      .safe-mt { margin-top: var(--sat); }
      .safe-mb { margin-bottom: var(--sab); }
    }
  </style>
